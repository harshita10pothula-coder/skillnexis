<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock & Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clock-box">
            <h2>Current Time</h2>
            <div class="clock" id="clock">00:00:00</div>
            <div class="date" id="date"></div>
        </div>

        <div class="countdown-box">
            <h2>Countdown to New Year 2027</h2>
            <div class="countdown" id="countdown">
                <div><span id="days">00</span><label>Days</label></div>
                <div><span id="hours">00</span><label>Hours</label></div>
                <div><span id="minutes">00</span><label>Minutes</label></div>
                <div><span id="seconds">00</span><label>Seconds</label></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
