<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 - Hover Effects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e272e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            margin: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #3498db;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.4);
        }

        .btn-success {
            background: #2ecc71;
            color: #fff;
        }

        .btn-success:hover {
            background: #27ae60;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(231,76,60,0.4);
        }

        .link {
            display: inline-block;
            margin: 20px 10px;
            color: #f1c40f;
            text-decoration: none;
            font-size: 1.1rem;
            position: relative;
            transition: color 0.3s;
        }

        .link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: #f1c40f;
            transition: width 0.3s ease;
        }

        .link:hover {
            color: #f39c12;
        }

        .link:hover::after {
            width: 100%;
        }

        h2 {
            color: #fff;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Hover Effects</h2>
        <div>
            <button class="btn btn-primary">Primary Button</button>
            <button class="btn btn-success">Success Button</button>
            <button class="btn btn-danger">Danger Button</button>
        </div>
        <div>
            <a href="#" class="link">Hover over this link</a>
            <a href="#" class="link">Another link</a>
        </div>
    </div>
</body>
</html>
