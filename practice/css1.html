<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q1 - Background & Fonts</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 400;
        }

        .highlight {
            font-weight: 600;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Custom Styling</h1>
        <p>This page uses a <span class="highlight">gradient background</span> and two custom fonts from Google Fonts — <strong>Playfair Display</strong> for the heading and <strong>Inter</strong> for the body text.</p>
    </div>
</body>
</html>
