<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q2 - Student Table</title>
    <style>
        table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 8px 16px; text-align: center; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h2>Student Marks</h2>
    <table>
        <tr><th>Student Name</th><th>Roll Number</th><th>Marks</th></tr>
        <tr><td>Alice Johnson</td><td>101</td><td>95</td></tr>
        <tr><td>Bob Smith</td><td>102</td><td>87</td></tr>
        <tr><td>Charlie Brown</td><td>103</td><td>92</td></tr>
        <tr><td>Diana Prince</td><td>104</td><td>88</td></tr>
        <tr><td>Eve Davis</td><td>105</td><td>91</td></tr>
    </table>
</body>
</html>
